<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Shape -->
  <rect width="512" height="512" rx="128" fill="#09090b"/>

  <!-- Shield/Vault Outer -->
  <path d="M256 60C200 60 120 85 100 120V260C100 360 180 430 256 460C332 430 412 360 412 260V120C392 85 312 60 256 60Z" fill="url(#grad1)" filter="url(#shadow)"/>

  <!-- Coin/Currency Symbol -->
  <circle cx="256" cy="240" r="80" fill="white" fill-opacity="0.15"/>
  <path d="M256 180V300M220 210H292M220 270H292" stroke="white" stroke-width="24" stroke-linecap="round"/>

  <!-- Glow effect -->
  <circle cx="256" cy="240" r="100" stroke="white" stroke-width="2" stroke-dasharray="10 20" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 256 240" to="360 256 240" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
